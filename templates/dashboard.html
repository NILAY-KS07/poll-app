<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Poll App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
    
    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyAoAti_pMh-keTxz3-UCYt3LrOljkvp9to",
            authDomain: "poll-app-bfe92.firebaseapp.com",
            projectId: "poll-app-bfe92",
            storageBucket: "poll-app-bfe92.firebasestorage.app",
            messagingSenderId: "1041150842496",
            appId: "1:1041150842496:web:c430f58cbd82ddf4d23865",
            measurementId: "G-W39CZ4Y67E"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();


        function sendTokenToServer(token) {
            const user_id = localStorage.getItem("user_id");
            if(!user_id || user_id === "null") return;

            console.log("Saving token for user:", user_id);
            fetch("/save-token", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: user_id,
                    token: token
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log("Server response:", data);
                if(data.success) {
                    document.getElementById("status-msg").innerText = "Notifications Enabled! 🔔";
                }
            })
            .catch(err => console.error("Error saving token:", err));
        }

        function initNotifications() {
            const userId = localStorage.getItem("user_id");
            if (!userId || userId === "null") return;

            Notification.requestPermission().then((permission) => {
                if (permission === 'granted') {
                    console.log('Permission granted. Getting token...');
                    messaging.getToken({ 
                        vapidKey: 'BIhMsucb3v8gurKdJa-Cv_K5s7xNnynIWicCuTmRPNRvx0V1M_YTkL6_vR4LH6a2scj7OBsvzhamF2eiQFavYlA' 
                    })
                    .then((currentToken) => {
                        if (currentToken) {
                            sendTokenToServer(currentToken);
                        }
                    }).catch((err) => console.log('Token Error:', err));
                }
            });
        }


        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("/firebase-messaging-sw.js")
                .then((registration) => {
                    console.log("SW Registered.");
                    initNotifications(); 
                }).catch((err) => console.error("SW Registration Failed:", err));
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Dashboard</h2>
        <div class="button-group">
            <button onclick="goToPoll()">Start Poll</button>
            <button onclick="goToVote()">Vote</button>
            <button onclick="goToResult()">Results</button>
        </div>
        <p id="status-msg" style="font-size: 0.8em; color: #4CAF50; margin-top: 20px;"></p>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        if (typeof checkAuth === "function") {
            checkAuth();
        }
    </script>
</body>
</html>
